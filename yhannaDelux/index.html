<!DOCTYPE html>
<html>
<head>
    <title>Coffee Task List</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Georgia', serif;
            background: linear-gradient(135deg, #E8D8C4 0%, #C7B7A3 100%);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
        }

        h1 {
            color: #561C24;
            text-align: center;
            margin-bottom: 30px;
            font-size: 2.5em;
            font-style: italic;
            letter-spacing: 2px;
        }

        .add-task-form {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
        }

        .add-task-form input {
            flex: 1;
            padding: 12px 15px;
            border: 2px solid #6D2932;
            border-radius: 25px;
            font-size: 1em;
            background-color: #E8D8C4;
            color: #561C24;
            font-family: 'Georgia', serif;
        }

        .add-task-form input::placeholder {
            color: #C7B7A3;
        }

        .add-task-form input:focus {
            outline: none;
            border-color: #561C24;
            box-shadow: 0 0 10px rgba(86, 28, 36, 0.3);
        }

        .add-task-form button {
            padding: 12px 30px;
            background-color: #561C24;
            color: #E8D8C4;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            font-size: 1em;
            font-family: 'Georgia', serif;
            font-weight: bold;
            transition: all 0.3s ease;
        }

        .add-task-form button:hover {
            background-color: #6D2932;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(86, 28, 36, 0.3);
        }

        .tasks-list {
            list-style: none;
        }

        .task-item {
            background-color: #E8D8C4;
            margin-bottom: 15px;
            padding: 15px 20px;
            border-radius: 15px;
            border-left: 4px solid #561C24;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
            box-shadow: 0 3px 10px rgba(86, 28, 36, 0.1);
            transition: all 0.3s ease;
        }

        .task-item:hover {
            background-color: #F0E6D8;
            border-left-color: #6D2932;
            transform: translateX(5px);
            box-shadow: 0 5px 15px rgba(86, 28, 36, 0.15);
        }

        .task-checkbox {
            width: 20px;
            height: 20px;
            cursor: pointer;
            margin-right: 15px;
            accent-color: #561C24;
            flex-shrink: 0;
        }

        .task-text {
            color: #561C24;
            font-size: 1.1em;
            flex: 1;
            word-break: break-word;
        }

        .task-item.completed .task-text {
            color: #C7B7A3;
            text-decoration: line-through;
        }

        .task-item.completed {
            opacity: 0.8;
        }

        .task-actions {
            display: flex;
            gap: 8px;
            margin-left: 10px;
        }

        .btn-edit, .btn-delete {
            padding: 6px 12px;
            border: none;
            border-radius: 12px;
            cursor: pointer;
            font-size: 0.85em;
            font-family: 'Georgia', serif;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        .btn-edit {
            background-color: #C7B7A3;
            color: #561C24;
            border: 1px solid #561C24;
        }

        .btn-edit:hover {
            background-color: #561C24;
            color: #E8D8C4;
        }

        .btn-delete {
            background-color: #6D2932;
            color: #E8D8C4;
            cursor: pointer;
        }

        .btn-delete:hover {
            background-color: #561C24;
            box-shadow: 0 3px 8px rgba(86, 28, 36, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #6D2932;
            font-style: italic;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>☕ Tasks</h1>

    <form class="add-task-form" id="addTaskForm">
        <input type="text" id="taskInput" placeholder="Add a new task..." required>
        <button type="submit">Add</button>
    </form>

    <ul class="tasks-list" id="tasksList">
    </ul>
</div>

<script>
    // Load tasks from localStorage
    function loadTasks() {
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        renderTasks(tasks);
    }

    // Save tasks to localStorage
    function saveTasks(tasks) {
        localStorage.setItem('tasks', JSON.stringify(tasks));
    }

    // Render tasks to the DOM
    function renderTasks(tasks) {
        const tasksList = document.getElementById('tasksList');
        tasksList.innerHTML = '';

        if (tasks.length === 0) {
            tasksList.innerHTML = '<div class="empty-state"><p>No tasks yet. Add one to get started! ☕</p></div>';
            return;
        }

        tasks.forEach(task => {
            const li = document.createElement('li');
            li.className = `task-item ${task.completed ? 'completed' : ''}`;
            li.innerHTML = `
                <input type="checkbox" class="task-checkbox" 
                       id="check-${task.id}"
                       ${task.completed ? 'checked' : ''}
                       onchange="updateStatus(${task.id})">
                <span class="task-text" id="task-${task.id}">
                    ${escapeHtml(task.name)}
                </span>
                <div class="task-actions">
                    <button class="btn-edit" onclick="editTask(${task.id})">
                        Edit
                    </button>
                    <button class="btn-delete" onclick="deleteTask(${task.id})">
                        Delete
                    </button>
                </div>
            `;
            tasksList.appendChild(li);
        });
    }

    // Add new task
    document.getElementById('addTaskForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const taskInput = document.getElementById('taskInput');
        const taskName = taskInput.value.trim();

        if (taskName === '') return;

        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        const newTask = {
            id: Date.now(),
            name: taskName,
            completed: false
        };

        tasks.push(newTask);
        saveTasks(tasks);
        renderTasks(tasks);
        taskInput.value = '';
        taskInput.focus();
    });

    // Edit task
    function editTask(id) {
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        const task = tasks.find(t => t.id === id);

        if (!task) return;

        const newName = prompt('Edit task:', task.name);
        if (newName !== null && newName.trim() !== '') {
            task.name = newName.trim();
            saveTasks(tasks);
            renderTasks(tasks);
        }
    }

    // Delete task
    function deleteTask(id) {
        if (confirm('Delete this task?')) {
            let tasks = JSON.parse(localStorage.getItem('tasks')) || [];
            tasks = tasks.filter(t => t.id !== id);
            saveTasks(tasks);
            renderTasks(tasks);
        }
    }

    // Update task status
    function updateStatus(id) {
        const checkbox = document.getElementById(`check-${id}`);
        const tasks = JSON.parse(localStorage.getItem('tasks')) || [];
        const task = tasks.find(t => t.id === id);

        if (task) {
            task.completed = checkbox.checked;
            saveTasks(tasks);
            renderTasks(tasks);
        }
    }

    // Escape HTML to prevent XSS
    function escapeHtml(text) {
        const map = {
            '&': '&amp;',
            '<': '&lt;',
            '>': '&gt;',
            '"': '&quot;',
            "'": '&#039;'
        };
        return text.replace(/[&<>"']/g, m => map[m]);
    }

    // Load tasks on page load
    window.addEventListener('DOMContentLoaded', loadTasks);
</script>

</body>
</html>
